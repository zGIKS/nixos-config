# Full Dark & White Glass - Monochrome Theme
add_newline = true

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration
$character
"""

[username]
show_always = true
style_user = "bold #E6EDF3"
style_root = "bold #F47067"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold #58A6FF"
format = "[@$hostname ]($style)"

[directory]
style = "bold #7AA2F7"
truncation_length = 3
truncate_to_repo = false
read_only = " ro"
read_only_style = "#E6EDF3"
format = "[in ](#9DA5B4)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git "
style = "#56D4DD"
format = "[$symbol$branch]($style) "

[git_status]
style = "#F6C177"
format = "[$all_status$ahead_behind]($style) "

[cmd_duration]
min_time = 1200
style = "#6B7280"
format = "[took $duration]($style) "

[character]
success_symbol = "[>](bold #4FD1A5)"
error_symbol = "[>](bold #F47067)"
vimcmd_symbol = "[<](bold #7AA2F7)"
