# Full Dark & White Glass - Monochrome Theme
add_newline = true

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration
$character
"""

[username]
show_always = true
style_user = "bold fg:white"
style_root = "bold fg:white"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold fg:white"
format = "[@$hostname ]($style)"

[directory]
style = "bold fg:white"
truncation_length = 3
truncate_to_repo = false
read_only = " ro"
read_only_style = "fg:white"
format = "[in ](fg:white)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git "
style = "fg:white"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:white"
format = "[$all_status$ahead_behind]($style) "

[cmd_duration]
min_time = 1200
style = "fg:gray"
format = "[took $duration]($style) "

[character]
success_symbol = "[>](bold fg:white)"
error_symbol = "[>](bold fg:white)"
vimcmd_symbol = "[<](bold fg:white)"
