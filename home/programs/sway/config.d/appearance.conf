# Window appearance aligned with Waybar/Wofi zinc palette
default_border pixel 1
default_floating_border pixel 1
hide_edge_borders smart

gaps inner 14
gaps outer 8
smart_borders on
smart_gaps off

client.focused          #fafafa #0a0a0c #fafafa #fafafa #fafafa
client.focused_inactive #27272a #0a0a0c #71717a #27272a #27272a
client.unfocused        #18181b #0a0a0c #71717a #18181b #18181b
client.urgent           #ef4444 #0a0a0c #ffffff #ef4444 #ef4444
client.placeholder      #18181b #0a0a0c #71717a #18181b #18181b

# Open new windows floating by default, including Xwayland apps.
for_window [app_id=".*"] floating enable
for_window [class=".*"] floating enable
