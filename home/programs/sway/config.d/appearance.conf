# Window appearance aligned with Waybar/Wofi zinc palette
default_border pixel 1
default_floating_border pixel 1
hide_edge_borders smart

gaps inner 14
gaps outer 8
smart_borders on
smart_gaps off

client.focused          #fafafa #18181b #fafafa #fafafa #fafafa
client.focused_inactive #3f3f46 #18181b #d4d4d8 #3f3f46 #3f3f46
client.unfocused        #27272a #0a0a0c #a1a1aa #27272a #27272a
client.urgent           #ef4444 #18181b #ffffff #ef4444 #ef4444
client.placeholder      #27272a #0a0a0c #71717a #27272a #27272a

# Open new windows floating by default, including Xwayland apps.
for_window [app_id=".*"] floating enable
for_window [class=".*"] floating enable
