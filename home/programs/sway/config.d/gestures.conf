# =============================================================================
# Session Layer — Input Gestures
# =============================================================================
# Native Sway touchpad bindings using bindgesture.
# No external daemons (e.g. Fusuma, libinput-gestures) are required.
# Isolated from keyboard bindings to respect single-responsibility.
# =============================================================================

# Switch workspaces with 3-finger horizontal swipe.
# Uses a helper script to enforce strict 1-9 circular order (no skipping empty workspaces).
bindgesture swipe:3:right exec sway-workspace-cycle next
bindgesture swipe:3:left  exec sway-workspace-cycle prev
