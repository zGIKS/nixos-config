# ─────────────────────────────────────────────────────────────────────────
#  Glass macOS Theme
#  Transparent blur effect with modern aesthetics
#  vers. 4.0.0
# ─────────────────────────────────────────────────────────────────────────

[window]
opacity = 0.94
blur = false
padding = { x = 16, y = 16 }
decorations = "Full"
dynamic_padding = true

[colors]
transparent_background_colors = true

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/run/current-system/sw/bin/fish"
args = ["-l"]

[font]
size = 12.0
builtin_box_drawing = true
normal = { family = "monospace" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

[cursor.vi_mode_style]
shape = "Block"

[colors.primary]
background = "#0f1115"
foreground = "#e6e6e6"

[colors.cursor]
cursor = "#4aa3ff"
text = "#0f1115"

[colors.selection]
text = "#0f1115"
background = "#4aa3ff"

[colors.normal]
black = "#151a21"
red = "#ff5d6c"
green = "#62c370"
yellow = "#f2c94c"
blue = "#4aa3ff"
magenta = "#c792ea"
cyan = "#5ad4e6"
white = "#e6e6e6"

[colors.bright]
black = "#2a2f3a"
red = "#ff7a87"
green = "#7adf8a"
yellow = "#f5d66b"
blue = "#6bb5ff"
magenta = "#d4a8f5"
cyan = "#7be0ef"
white = "#ffffff"

[colors.dim]
black = "#0b0d11"
red = "#cc4b58"
green = "#4ea45a"
yellow = "#c8a83f"
blue = "#3c84cc"
magenta = "#9f6fc2"
cyan = "#47a9b8"
white = "#c9c9c9"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "None" }
binding = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

[scrolling]
history = 10000
multiplier = 3

[bell]
duration = 0
