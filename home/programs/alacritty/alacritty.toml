# ─────────────────────────────────────────────────────────────────────────
#  Full Dark & White Glass Theme
#  Monochrome aesthetics with high contrast
#  vers. 5.0.0
# ─────────────────────────────────────────────────────────────────────────

[window]
opacity = 0.85
blur = true
padding = { x = 16, y = 16 }
decorations = "None"
dynamic_padding = true

[colors]
transparent_background_colors = true

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/run/current-system/sw/bin/fish"
args = ["-l"]

[font]
size = 12.0
builtin_box_drawing = true
normal = { family = "JetBrainsMono Nerd Font" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

[cursor.vi_mode_style]
shape = "Block"

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[colors.cursor]
cursor = "#ffffff"
text = "#000000"

[colors.selection]
text = "#000000"
background = "#ffffff"

[colors.normal]
black = "#000000"
red = "#ffffff"
green = "#ffffff"
yellow = "#ffffff"
blue = "#ffffff"
magenta = "#ffffff"
cyan = "#ffffff"
white = "#ffffff"

[colors.bright]
black = "#4d4d4d"
red = "#ffffff"
green = "#ffffff"
yellow = "#ffffff"
blue = "#ffffff"
magenta = "#ffffff"
cyan = "#ffffff"
white = "#ffffff"

[colors.dim]
black = "#1a1a1a"
red = "#cccccc"
green = "#cccccc"
yellow = "#cccccc"
blue = "#cccccc"
magenta = "#cccccc"
cyan = "#cccccc"
white = "#cccccc"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "None" }
binding = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

[scrolling]
history = 10000
multiplier = 3

[bell]
duration = 0
