# ─────────────────────────────────────────────────────────────────────────
#  Full Dark & White Glass Theme
#  Monochrome aesthetics with high contrast
#  vers. 5.0.0
# ─────────────────────────────────────────────────────────────────────────

[window]
opacity = 0.85
blur = true
padding = { x = 16, y = 16 }
decorations = "None"
dynamic_padding = true

[colors]
transparent_background_colors = true

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/run/current-system/sw/bin/fish"
args = ["-l"]

[font]
size = 12.0
builtin_box_drawing = true
normal = { family = "JetBrainsMono Nerd Font" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

[cursor.vi_mode_style]
shape = "Block"

[colors.primary]
background = "#0F1117"
foreground = "#E6EDF3"

[colors.cursor]
cursor = "#7AA2F7"
text = "#0F1117"

[colors.selection]
text = "#E6EDF3"
background = "#2F3342"

[colors.normal]
black = "#1D212B"
red = "#F47067"
green = "#4FD1A5"
yellow = "#F6C177"
blue = "#58A6FF"
magenta = "#C678DD"
cyan = "#56D4DD"
white = "#E6EDF3"

[colors.bright]
black = "#2A2E3A"
red = "#FF7B72"
green = "#7EE787"
yellow = "#F2CC60"
blue = "#79C0FF"
magenta = "#D2A8FF"
cyan = "#76E3EA"
white = "#FFFFFF"

[colors.dim]
black = "#1a1a1a"
red = "#cccccc"
green = "#cccccc"
yellow = "#cccccc"
blue = "#cccccc"
magenta = "#cccccc"
cyan = "#cccccc"
white = "#cccccc"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "None" }
binding = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

[scrolling]
history = 10000
multiplier = 3

[bell]
duration = 0
