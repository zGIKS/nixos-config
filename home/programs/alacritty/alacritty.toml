# ─────────────────────────────────────────────────────────────────────────
#  Shadcn Dark Theme (Zinc)
#  Pure monochrome dark aesthetics - Re-implemented
# ─────────────────────────────────────────────────────────────────────────

[window]
opacity = 0.85
blur = true
padding = { x = 24, y = 24 }
decorations = "None"
dynamic_padding = true

[colors]
transparent_background_colors = true

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/run/current-system/sw/bin/fish"
args = ["-l"]

[font]
size = 12.0
builtin_box_drawing = true
normal = { family = "JetBrainsMono Nerd Font" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

[cursor.vi_mode_style]
shape = "Block"

[colors.primary]
background = "#0a0a0c"  # El negro neutro que te gustó
foreground = "#fafafa"

[colors.cursor]
cursor = "#ffffff"
text = "#0a0a0c"

[colors.selection]
text = "#fafafa"
background = "#27272a"

[colors.normal]
black = "#18181b"
red = "#ef4444"
green = "#22c55e"
yellow = "#eab308"
blue = "#3b82f6"
magenta = "#a855f7"
cyan = "#06b6d4"
white = "#f4f4f5"

[colors.bright]
black = "#3f3f46"
red = "#f87171"
green = "#4ade80"
yellow = "#facc15"
blue = "#60a5fa"
magenta = "#c084fc"
cyan = "#22d3ee"
white = "#ffffff"

[colors.dim]
black = "#18181b"
red = "#7f1d1d"
green = "#14532d"
yellow = "#713f12"
blue = "#1e3a8a"
magenta = "#581c87"
cyan = "#164e63"
white = "#a1a1aa"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "None" }
binding = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

[scrolling]
history = 10000
multiplier = 3

[bell]
duration = 0
